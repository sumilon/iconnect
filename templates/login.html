{% extends "base.html" %}
{% block title %}Login — iConnect{% endblock %}
{% block content %}
<div class="container" style="max-width:420px; padding-top:40px;">
    <div class="card">
        <div class="card-body">
            <h2 style="margin-bottom:4px;">Welcome Back</h2>
            <p style="color:#999; font-size:0.86rem; margin-bottom:20px;">Log in to your account</p>
            {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
            {% if success %}<div class="alert" style="background:#dcfce7; color:#166534;">✓ {{ success }}</div>{% endif %}
            <form method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@email.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Your password" required />
                </div>
                <button type="submit" class="btn btn-primary btn-full">Log In</button>
            </form>
            <p style="text-align:center; margin-top:16px; font-size:0.86rem; color:#777;">
                Don't have an account? <a href="{{ url_for('auth.register') }}" style="color:#1877f2;">Register</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
