{% extends "base.html" %}
{% block title %}Upload - iConnect{% endblock %}
{% block content %}
<div class="container" style="max-width:500px;">
    <h2 style="margin-bottom:20px;">&#128228; New Post</h2>
    <div class="card">
        <div class="card-body">
            {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
                <div class="form-group">
                    <label>Image</label>
                    <input type="file" name="image" accept="image/*" required />
                </div>
                <div class="form-group">
                    <label>Caption <span style="color:#bbb; font-weight:400;">(optional)</span></label>
                    <textarea name="caption" rows="3" placeholder="Write something..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Post</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
