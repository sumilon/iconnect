{% extends "base.html" %}
{% block title %}Change Password — iConnect{% endblock %}

{% block extra_style %}
<style>
    .auth-wrap {
        min-height: calc(100vh - 54px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
    }
    .auth-box {
        background: white;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        padding: 36px 32px;
        width: 100%;
        max-width: 400px;
    }
    .auth-box h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .auth-box .subtitle { font-size: 0.85rem; color: #8a8d91; margin-bottom: 24px; }
    .match-msg { font-size: 0.76rem; margin-top: 5px; min-height: 16px; }
    .back-link {
        display: block;
        text-align: center;
        margin-top: 18px;
        font-size: 0.85rem;
        color: #1877f2;
        text-decoration: none;
        font-weight: 600;
    }
    .back-link:hover { text-decoration: underline; }
    @media (max-width: 480px) {
        .auth-box { padding: 28px 20px; border-radius: 12px; }
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-box">
        <h2>&#128273; Change Password</h2>
        <p class="subtitle">You'll be logged out after updating.</p>

        {% if error %}
        <div class="alert alert-error">&#9888; {{ error }}</div>
        {% endif %}

        <form method="POST" data-loading-msg="Changing password…">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password"
                       placeholder="Your current password" required autocomplete="current-password" />
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="newPwd" name="new_password"
                       placeholder="Min 6 characters" required autocomplete="new-password"
                       minlength="6" oninput="checkMatch()" />
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirmPwd" name="confirm_password"
                       placeholder="Repeat new password" required autocomplete="new-password"
                       oninput="checkMatch()" />
                <p class="match-msg" id="matchMsg"></p>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Update Password</button>
        </form>

        <a href="{{ url_for('main.my_profile') }}" class="back-link">&#8592; Back to Profile</a>
    </div>
</div>

<script>
function checkMatch() {
    var np  = document.getElementById('newPwd').value;
    var cp  = document.getElementById('confirmPwd').value;
    var msg = document.getElementById('matchMsg');
    if (!cp) { msg.textContent = ''; return; }
    if (np === cp) {
        msg.style.color = '#16a34a';
        msg.textContent = '✓ Passwords match';
    } else {
        msg.style.color = '#dc2626';
        msg.textContent = '✗ Passwords do not match';
    }
}
</script>
{% endblock %}
