{% extends "base.html" %}
{% block title %}Change Password — iConnect{% endblock %}
{% block content %}
<div class="container" style="max-width:420px; padding-top:40px;">
    <div class="card">
        <div class="card-body">
            <h2 style="margin-bottom:4px;">🔑 Change Password</h2>
            <p style="color:#999; font-size:0.86rem; margin-bottom:20px;">
                You will be logged out after changing your password.
            </p>

            {% if error %}
            <div class="alert alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}" />

                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" name="current_password"
                           placeholder="Your current password" required autocomplete="current-password" />
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="new_password" id="newPwd"
                           placeholder="Min 6 characters" required autocomplete="new-password"
                           oninput="checkMatch()" />
                </div>

                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" name="confirm_password" id="confirmPwd"
                           placeholder="Repeat new password" required autocomplete="new-password"
                           oninput="checkMatch()" />
                    <p id="matchMsg" style="font-size:0.78rem; margin-top:4px; display:none;"></p>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Update Password</button>
            </form>

            <p style="text-align:center; margin-top:16px; font-size:0.86rem; color:#777;">
                <a href="{{ url_for('main.my_profile') }}" style="color:#1877f2;">← Back to Profile</a>
            </p>
        </div>
    </div>
</div>

<script>
    function checkMatch() {
        var np  = document.getElementById('newPwd').value;
        var cp  = document.getElementById('confirmPwd').value;
        var msg = document.getElementById('matchMsg');
        if (cp.length === 0) { msg.style.display = 'none'; return; }
        msg.style.display = 'block';
        if (np === cp) {
            msg.style.color   = '#16a34a';
            msg.textContent   = '✓ Passwords match';
        } else {
            msg.style.color   = '#dc2626';
            msg.textContent   = '✗ Passwords do not match';
        }
    }
</script>
{% endblock %}
