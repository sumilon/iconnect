{% extends "base.html" %}
{% block title %}Register — PixelComm{% endblock %}
{% block content %}
<div class="container" style="max-width:420px; padding-top:40px;">
    <div class="card">
        <div class="card-body">
            <h2 style="margin-bottom:4px;">Create Account</h2>
            <p style="color:#999; font-size:0.86rem; margin-bottom:20px;">Join PixelComm and start sharing</p>
            {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
            <form method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="e.g. john_doe" required />
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@email.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Min 6 characters" required />
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>
            <p style="text-align:center; margin-top:16px; font-size:0.86rem; color:#777;">
                Already have an account? <a href="/login" style="color:#1877f2;">Log in</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
