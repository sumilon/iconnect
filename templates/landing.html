<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>PixelComm</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
          font-family: 'Segoe UI', sans-serif;
          background: linear-gradient(135deg, #1877f2, #0d47a1);
          min-height: 100vh; display: flex;
          align-items: center; justify-content: center;
        }
        .hero { text-align: center; color: white; padding: 40px 20px; }
        .hero .icon { font-size: 4.5rem; margin-bottom: 16px; }
        .hero h1   { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; }
        .hero p    { font-size: 1.05rem; opacity: 0.8; margin-bottom: 32px; max-width: 380px; }
        .btns { display: flex; gap: 14px; justify-content: center; }
        .btn {
          padding: 12px 32px; border-radius: 10px; font-size: 0.95rem;
          font-weight: 700; text-decoration: none; cursor: pointer;
          border: none; transition: opacity 0.2s;
        }
        .btn:hover  { opacity: 0.85; }
        .btn-white  { background: white; color: #1877f2; }
        .btn-border { background: transparent; color: white; border: 2px solid white; }
    </style>
</head>
<body>
<div class="hero">
    <div class="icon">📸</div>
    <h1>PixelComm</h1>
    <p>Share photos privately with people you trust. Follow, get approved, and connect.</p>
    <div class="btns">
        <a href="/register" class="btn btn-white">Get Started</a>
        <a href="/login"    class="btn btn-border">Log In</a>
    </div>
</div>
</body>
</html>
