{% extends "base.html" %}
{% block title %}iConnect — Share Photos Privately{% endblock %}

{% block extra_style %}
<style>
    body {
      background: linear-gradient(135deg, #1877f2, #0d47a1) !important;
      min-height: 100vh;
    }
    nav { background: rgba(0,0,0,0.15) !important; box-shadow: none !important; }
    .landing-wrap {
      min-height: calc(100vh - 56px);
      display: flex; align-items: center; justify-content: center;
    }
    .hero { text-align: center; color: white; padding: 40px 20px; }
    .hero .icon { font-size: 4.5rem; margin-bottom: 16px; }
    .hero h1   { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; }
    .hero p    {
      font-size: 1.05rem; opacity: 0.8; margin-bottom: 32px;
      max-width: 380px; margin-left: auto; margin-right: auto;
    }
    .btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-white  { background: white; color: #1877f2; }
    .btn-border { background: transparent; color: white; border: 2px solid white; }
</style>
{% endblock %}

{% block content %}
<div class="landing-wrap">
    <div class="hero">
        <div class="icon">🔗</div>
        <h1>iConnect</h1>
        <p>Share photos privately with people you trust. Follow, get approved, and connect.</p>
        <div class="btns">
            <a href="{{ url_for('auth.register') }}" class="btn btn-white">Get Started</a>
            <a href="{{ url_for('auth.login') }}"    class="btn btn-border">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
